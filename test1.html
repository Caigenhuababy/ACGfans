<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./test1.css">
    <script src="./jquery.js"></script>
    <script src="./a.js"></script>
    <title>轮播图</title>
</head>
<body>
    <div id="index-wrap">
        <div id="index-viewpoint">
          <ul>
            <li><img src="./1.png" alt=""></li>
            <li><img src="./2.png" alt=""></li>
            <li><img src="./3.png" alt=""></li>
            <li><img src="./4.png" alt=""></li>
            <li><img src="./5.png" alt=""></li>
            <!-- <li><img src="images/jxd1.jpg" alt=""></li> -->
          </ul>
        </div>
        
        <div id="index-viewpoint-control">
          <ul>
            <li id="viewpoint-prev"><a href="#"><div class="dot-left"></div></a></li>
            <li id="viewpoint-next"><a href="#"><div class="dot-right"></div></a></li>
          </ul>
          <ol id="viewpoint-circle">
            <li><a>1</a></li>
            <li><a>2</a></li>
            <li><a>3</a></li>
            <li><a>4</a></li>
            <li><a>5</a></li>
          </ol>
        </div>
    </div>
</body>
</html>
